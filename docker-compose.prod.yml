services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: lumilaya
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - nginx-network
      - postgres-network
      - lumilaya-network

# Réseaux externes existants
networks:
  nginx-network:
    external: true
  postgres-network:
    external: true
  lumilaya-network:
    external: true
